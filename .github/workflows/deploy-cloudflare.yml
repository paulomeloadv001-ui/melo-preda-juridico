name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Worker + Sync D1
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Frontend (Vite)
        run: npx vite build
        env:
          VITE_APP_ID: ${{ secrets.VITE_APP_ID }}
          VITE_OAUTH_PORTAL_URL: ${{ secrets.VITE_OAUTH_PORTAL_URL }}
          VITE_APP_TITLE: ${{ secrets.VITE_APP_TITLE }}
          VITE_APP_LOGO: ${{ secrets.VITE_APP_LOGO }}
          VITE_FRONTEND_FORGE_API_URL: ${{ secrets.VITE_FRONTEND_FORGE_API_URL }}
          VITE_FRONTEND_FORGE_API_KEY: ${{ secrets.VITE_FRONTEND_FORGE_API_KEY }}

      - name: Prepare Cloudflare dist
        run: |
          rm -rf dist-cf
          mkdir -p dist-cf
          cp -r dist/public dist-cf/public

      - name: Build Worker
        run: |
          npx esbuild cloudflare/worker.ts \
            --bundle \
            --outfile=dist-cf/worker.js \
            --format=esm \
            --target=es2022 \
            --minify

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --no-bundle

      - name: Sync Data TiDB → D1
        if: success()
        env:
          CF_EMAIL: ${{ secrets.CLOUDFLARE_EMAIL }}
          CF_API_KEY: ${{ secrets.CLOUDFLARE_API_KEY }}
          CF_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          D1_DATABASE_ID: ${{ secrets.D1_DATABASE_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "Sincronizando dados TiDB → D1..."
          node cloudflare/sync-data.mjs
